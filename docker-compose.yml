services:
  stashai:
    image: ghcr.io/binbin2000/stashapp-recommender:latest
    build: .
    container_name: stashapp-recommender
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      STASHAI_STASH_URL: ${STASHAI_STASH_URL:-http://host.docker.internal:9999/graphql}
      STASHAI_STASH_API_KEY: ${STASHAI_STASH_API_KEY:-}
      STASHAI_STASH_PAGE_SIZE: ${STASHAI_STASH_PAGE_SIZE:-100}
      STASHAI_DATABASE_URL: ${STASHAI_DATABASE_URL:-sqlite:////app/data/stashai.sqlite3}
      STASHAI_MODELS_DIRECTORY: ${STASHAI_MODELS_DIRECTORY:-/app/models}
      STASHAI_MODELS_POSITIVE_RATING_THRESHOLD: ${STASHAI_MODELS_POSITIVE_RATING_THRESHOLD:-4}
      STASHAI_MODELS_NEGATIVE_RATING_THRESHOLD: ${STASHAI_MODELS_NEGATIVE_RATING_THRESHOLD:-2}
      STASHAI_MODELS_RECOMMENDATION_THRESHOLD: ${STASHAI_MODELS_RECOMMENDATION_THRESHOLD:-0.70}
      STASHAI_MODELS_REVIEW_CONFIDENCE_THRESHOLD: ${STASHAI_MODELS_REVIEW_CONFIDENCE_THRESHOLD:-0.35}
      STASHAI_MODELS_REMOVAL_THRESHOLD: ${STASHAI_MODELS_REMOVAL_THRESHOLD:-0.65}
      STASHAI_APP_HOST: ${STASHAI_APP_HOST:-0.0.0.0}
      STASHAI_APP_PORT: ${STASHAI_APP_PORT:-8088}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
